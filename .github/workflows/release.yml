name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, e.g. v1.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Import signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' && env.KEYCHAIN_PASSWORD != '' && env.APPLE_SIGNING_IDENTITY != '' }}
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/webbar-build.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build app bundle
        run: bash scripts/build_app.sh

      - name: Codesign app
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' }}
        shell: bash
        run: |
          codesign --force --deep --options runtime --sign "$APPLE_SIGNING_IDENTITY" "dist/WebBar.app"
          codesign --verify --deep --strict "dist/WebBar.app"

      - name: Build dmg
        run: bash scripts/build_dmg.sh

      - name: Codesign dmg
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' }}
        shell: bash
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -name 'WebBar-*.dmg' | head -n 1)"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"
          codesign --verify --strict "$DMG_PATH"

      - name: Notarize app and dmg
        if: ${{ env.APPLE_SIGNING_IDENTITY != '' && env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        shell: bash
        run: |
          DMG_PATH="$(find dist -maxdepth 1 -name 'WebBar-*.dmg' | head -n 1)"
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: webbar-dmg
          path: dist/WebBar-*.dmg

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi
          gh release upload "$RELEASE_TAG" dist/WebBar-*.dmg --clobber
